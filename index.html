<!DOCTYPE html>
<!-- Dev Containerでの開発デモンストレーション: Antigravityが見守っています！ -->
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine Shifter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Quicksand:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar: Split into two blocks -->
        <aside class="sidebar">
            <!-- Upper Panel: Header & Manual -->
            <section class="glass-panel sidebar-upper">
                <header>
                    <h1><a href="https://watdat.github.io/RoutineShifterApp/"
                            style="color: inherit; text-decoration: none;">Daily Routine Shifter</a></h1>
                    <p>1日のルーティンを可視化し、時間をシフトして確認できます</p>

                    <!-- Memo Field -->
                    <div style="margin-top: 1.5rem;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label for="memoInput"
                                style="color:var(--text-color); font-size:1rem; margin-bottom:0.5rem; opacity:0.9;">Memo:</label>
                            <div style="font-size: 0.8rem; opacity: 0.8; display: flex; align-items: center; gap: 8px;">
                                <select id="chimeSelect"
                                    style="background: rgba(0,0,0,0.3); color: var(--text-color); border: 1px solid var(--panel-border); border-radius: 4px; padding: 1px 4px; font-size: 0.85rem; cursor: pointer; outline: none;">
                                    <option value="none">None</option>
                                    <option value="bell">Soft Bell</option>
                                    <option value="ding">Ding</option>
                                    <option value="marimba">Marimba</option>
                                    <option value="digital">Digital</option>
                                </select>
                                <button id="testChimeBtn" class="btn-secondary"
                                    style="padding: 2px 8px; font-size: 0.8rem; border-radius: 4px;">Sound Test</button>
                            </div>
                        </div>
                        <textarea id="memoInput" class="memo-area"
                            placeholder="(Todoやちょっとしたメモなど、ここに置いておくことができます)"></textarea>
                    </div>

                    <!-- Checkbox Row -->
                    <div class="checkbox-row">
                        <label class="checkbox-item wakeup-item"
                            style="color:var(--text-color); opacity:0.9; margin-right:0.5rem; font-weight:normal;">
                            Wake: <input type="time" id="baseWakeupTime" value="05:00"
                                style="width:auto; padding:2px 8px; font-size:1.0rem; border:1px solid #ffffff; border-radius:15px; background:rgba(0,0,0,0.3); color:var(--secondary-color); font-family:inherit; cursor:pointer; outline:none;">
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake0"> Wake+0h (<span class="dynamic-time"
                                data-offset="0">05:00</span>)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake8"> Wake+8h (<span class="dynamic-time"
                                data-offset="8">13:00</span>)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake16"> Wake+16h (<span class="dynamic-time"
                                data-offset="16">21:00</span>)
                        </label>
                    </div>
                </header>
            </section>

            <!-- Chart Panel -->
            <section class="chart-area glass-panel">
                <canvas id="routineChart"></canvas>
            </section>

            <!-- Lower Panel: Shift, Status, List -->
            <section class="glass-panel sidebar-lower">
                <section class="shift-section">
                    <div class="shift-header">
                        <label class="shift-label" style="margin:0;">時間をずらす (時間)</label>
                        <a href="manual.html" class="usage-guide-link">ℹ️ 使い方ガイド</a>
                    </div>

                    <div class="shift-ui-container">
                        <!-- Left: Buttons -->
                        <div class="shift-btn-group">
                            <button id="shiftMinus" class="btn-shift-tall">-</button>
                            <button id="shiftPlus" class="btn-shift-tall">+</button>
                        </div>

                        <!-- Right: Value & Slider -->
                        <div class="shift-value-group">
                            <div class="shift-display-box">
                                <input type="text" id="shiftHours" class="shift-display-input" value="+00:00" readonly>
                            </div>
                            <input type="range" id="shiftSlider" class="shift-range" value="0" min="-24" max="24"
                                step="0.25">
                        </div>
                    </div>
                </section>

                <div class="divider"></div>

                <section class="status-section">
                    <h2>シフト後の今の活動</h2>
                    <div id="shiftedActivity" class="status-highlight">特に無し (Free Time)</div>
                </section>

                <section class="list-section">
                    <h2>シフト後のスケジュール一覧</h2>
                    <div class="list-scroll-container">
                        <ul id="shiftedScheduleList"></ul>
                    </div>
                </section>
            </section>
        </aside>

        <!-- Main Content: Inputs -->
        <main class="main-content">
            <div class="input-area">
                <section class="sync-section glass-panel">
                    <div class="sync-header">
                        <h2>IDデータ読み書き</h2>
                        <div class="sync-token-area">
                            <div id="ghTokenWrapper" class="gh-token-wrapper">
                                <input type="password" id="ghTokenInput" class="gh-token-input" placeholder="Token">
                            </div>
                            <button id="shareSettingsBtn" class="btn-share" title="設定をスマホへ転送">📲</button>
                        </div>
                    </div>

                    <div class="sync-control-stack">
                        <!-- Row 1: ID Input -->
                        <div class="sync-id-row">
                            <span id="syncStatus" class="sync-status inactive sync-status-dot" title="同期オフ">●</span>
                            <input type="text" id="syncIdInput" class="sync-id-input" placeholder="ID (例: ひかるほし)">
                        </div>

                        <!-- Row 2: Save - NewID - Load -->
                        <div class="sync-btn-row">
                            <!-- Save Block -->
                            <div id="pushSyncBtn" class="sync-block-btn">
                                <span class="sync-block-label">保存</span>
                                <span id="lastSavedDisplay" class="sync-block-time">最終更新: --:--</span>
                            </div>

                            <!-- New ID Btn -->
                            <button id="genSyncIdBtn" class="btn-new-id">新ID作成</button>

                            <!-- Load Block -->
                            <div id="loadSyncBtn" class="sync-block-btn">
                                <span class="sync-block-label">読込</span>
                                <span id="lastLoadDisplay" class="sync-block-time">最終更新: --:--</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Individual Settings -->
                <section class="individual-settings glass-panel">
                    <h2>ルーティン個別設定</h2>
                    <div class="input-group">
                        <input type="text" id="activityName" placeholder="活動名 (例: 睡眠)">
                        <div class="time-inputs">
                            <label>開始: <input type="time" id="startTime"></label>
                            <label>終了: <input type="time" id="endTime"></label>
                        </div>
                        <button id="addBtn" class="btn-primary">追加</button>
                    </div>
                </section>

                <!-- Bulk Import -->
                <section class="bulk-import glass-panel">
                    <div class="shift-header">
                        <h2>一括登録</h2>
                        <a href="manual.html" class="usage-guide-link">ℹ️ 使い方ガイド</a>
                    </div>
                    <div class="input-group">
                        <textarea id="bulkInput" rows="5" placeholder="例：
睡眠 22:00-05:00
仕事 09:00 - 17:00"></textarea>
                        <button id="importBtn" class="btn-primary" style="margin-top:0.5rem;">テキストから読み込む</button>
                        <p style="font-size:0.8rem; color:#aaa; margin-top:0.5rem;">※既存のルーティンは上書きされます</p>
                    </div>
                </section>
            </div>
        </main>
        </main>
    </div>

    <!-- Share Modal -->
    <div id="shareModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div class="glass-panel" style="padding:2rem; text-align:center; max-width:90%; position:relative;">
            <button id="closeShareModal"
                style="position:absolute; top:10px; right:15px; background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h3 style="margin-top:0; color:var(--secondary-color);">スマホへ設定を転送</h3>

            <div id="qrcode"
                style="background:white; padding:15px; border-radius:8px; margin:1rem auto; width: fit-content;"></div>

            <p style="font-size:0.9rem; margin-bottom:1rem;">カメラで読み取るか、URLをコピーしてください</p>

            <div style="display:flex; gap:0.5rem; justify-content:center;">
                <button id="copyLinkBtn" class="btn-secondary" style="font-size:0.9rem;">🔗設定リンクをコピー</button>
            </div>
            <div id="copyMsg" style="height:1.2em; color:var(--secondary-color); font-size:0.8rem; margin-top:0.5rem;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
