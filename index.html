<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine Shifter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar: Split into two blocks -->
        <aside class="sidebar">
            <!-- Upper Panel: Header & Manual -->
            <section class="glass-panel sidebar-upper">
                <header>
                    <div class="title-header">
                        <h1><a href="https://watdat.github.io/RoutineShifterApp/">Daily Routine Shifter</a></h1>
                        <a href="manual.html" class="usage-guide-link">ℹ️ 使い方ガイド</a>
                    </div>
                    <p>1日のルーティンを可視化し、時間をシフトして確認できます</p>

                    <!-- Memo Field -->
                    <div class="memo-container">
                        <div class="memo-header">
                            <label for="memoInput" class="memo-label">Memo:</label>
                            <div class="sound-controls">
                                <select id="chimeSelect">
                                    <option value="none">None</option>
                                    <option value="bell">Soft Bell</option>
                                    <option value="ding">Ding</option>
                                    <option value="marimba">Marimba</option>
                                    <option value="digital">Digital</option>
                                </select>
                                <button id="testChimeBtn" class="btn-secondary">Sound Test</button>
                            </div>
                        </div>
                        <textarea id="memoInput" class="memo-area" placeholder="(Todoやちょっとしたメモなど、ここに置いておくことができます)"></textarea>
                    </div>

                    <!-- Checkbox Row -->
                    <div class="checkbox-row">
                        <label class="checkbox-item wakeup-item">
                            Wake: <input type="time" id="baseWakeupTime" value="05:00">
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake0"> Wake+0h (<span class="dynamic-time" data-offset="0">05:00</span>)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake8"> Wake+8h (<span class="dynamic-time" data-offset="8">13:00</span>)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="checkWake16"> Wake+16h (<span class="dynamic-time" data-offset="16">21:00</span>)
                        </label>
                    </div>
                </header>
            </section>

            <!-- Chart Panel -->
            <section class="chart-area glass-panel">
                <canvas id="routineChart"></canvas>
            </section>

            <!-- Lower Panel: Shift, Status, List -->
            <section class="glass-panel sidebar-lower">
                <section class="shift-section">
                    <div class="shift-header">
                        <label class="shift-label">時間をずらす (15分毎)</label>
                        <span id="resetShift" class="reset-link">シフトをリセット</span>
                    </div>

                    <div class="shift-ui-container">
                        <!-- Left: Buttons -->
                        <div class="shift-btn-group">
                            <button id="shiftMinus" class="btn-shift-tall">-</button>
                            <button id="shiftPlus" class="btn-shift-tall">+</button>
                        </div>

                        <!-- Right: Value & Slider -->
                        <div class="shift-value-group">
                            <div class="shift-display-box">
                                <input type="text" id="shiftHours" class="shift-display-input" value="+00:00" readonly>
                            </div>
                            <input type="range" id="shiftSlider" class="shift-range" value="0" min="-24" max="24" step="0.25">
                        </div>
                    </div>
                </section>

                <div class="divider"></div>

                <section class="list-section">
                    <h2>シフト後のスケジュール一覧</h2>
                    <div class="list-scroll-container">
                        <ul id="shiftedScheduleList"></ul>
                    </div>
                </section>
            </section>
        </aside>

        <!-- Main Content: Inputs -->
        <main class="main-content">
            <div class="input-area">
                
                <!-- Individual Settings -->
                <section class="individual-settings glass-panel">
                    <h2>ルーティン個別設定</h2>
                    <div class="input-group">
                        <input type="text" id="activityName" placeholder="活動名 (例: 睡眠)">
                        <div class="time-inputs">
                            <label>開始: <input type="time" id="startTime"></label>
                            <label>終了: <input type="time" id="endTime"></label>
                        </div>
                        <button id="addBtn" class="btn-primary">追加</button>
                    </div>
                </section>

                <!-- Bulk Import -->
                <section class="bulk-import glass-panel">
                    <div class="shift-header">
                        <h2>一括登録</h2>
                        <a href="manual.html" class="usage-guide-link">ℹ️ 使い方ガイド</a>
                    </div>
                    <div class="input-group">
                        <textarea id="bulkInput" rows="5" placeholder="例：
睡眠 22:00-05:00
仕事 09:00 - 17:00"></textarea>
                        <button id="importBtn" class="btn-primary">テキストから読み込む</button>
                        <p class="import-note">※既存のルーティンは上書きされます</p>
                    </div>
                </section>
                
                <section class="sync-section glass-panel">
                    <div class="sync-header">
                        <h2>IDデータ読み書き</h2>
                        <div class="sync-token-area">
                            <div id="ghTokenWrapper" class="gh-token-wrapper">
                                <input type="password" id="ghTokenInput" class="gh-token-input" placeholder="Token">
                            </div>
                            <button id="shareSettingsBtn" class="btn-share" title="設定をスマホへ転送">📲</button>
                        </div>
                    </div>

                    <div class="sync-control-stack">
                        <!-- Row 1: ID Input -->
                        <div class="sync-id-row">
                            <span id="syncStatus" class="sync-status inactive sync-status-dot" title="同期オフ">●</span>
                            <input type="text" id="syncIdInput" class="sync-id-input" placeholder="ID (例: ひかるほし)">
                        </div>

                        <!-- Row 2: Save - NewID - Load -->
                        <div class="sync-btn-row">
                            <!-- Save Block -->
                            <div id="pushSyncBtn" class="sync-block-btn">
                                <span class="sync-block-label">保存</span>
                                <span id="lastSavedDisplay" class="sync-block-time">最終更新: --:--</span>
                            </div>

                            <!-- New ID Btn -->
                            <button id="genSyncIdBtn" class="btn-new-id">新ID作成</button>

                            <!-- Load Block -->
                            <div id="loadSyncBtn" class="sync-block-btn">
                                <span class="sync-block-label">読込</span>
                                <span id="lastLoadDisplay" class="sync-block-time">最終更新: --:--</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Share Modal -->
    <div id="shareModal">
        <div class="share-panel">
            <button id="closeShareModal">&times;</button>
            <h3 class="share-title">スマホへ設定を転送</h3>
            <div id="qrcode"></div>
            <p class="share-note">カメラで読み取るか、URLをコピーしてください</p>
            <div class="share-btn-row">
                <button id="copyLinkBtn" class="btn-secondary">🔗設定リンクをコピー</button>
            </div>
            <div id="copyMsg"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
